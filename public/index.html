<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ZMP 工时自动填报</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="toolbar">
        <div>
          <h1>ZMP 工时自动填报</h1>
          <p>选择本月需要填报的日期，确认配置后启动浏览器 agent。</p>
        </div>
        <div class="month-switcher">
          <button id="prevMonth" type="button" aria-label="上个月">‹</button>
          <strong id="monthLabel"></strong>
          <button id="nextMonth" type="button" aria-label="下个月">›</button>
        </div>
      </section>

      <section class="layout">
        <div class="calendar-panel">
          <div class="calendar-actions">
            <button id="selectMonth" type="button">选择全月</button>
            <button id="clearDates" type="button">清空</button>
          </div>
          <div class="weekdays">
            <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
          </div>
          <div id="calendar" class="calendar"></div>
        </div>

        <aside class="config-panel">
          <label>
            自然语言指令
            <textarea id="requestText" rows="2" placeholder="例如：帮我填写本月工时"></textarea>
          </label>

          <label>
            每天工时
            <input id="hours" type="number" min="0.5" max="24" step="0.5" value="8">
          </label>

          <label>
            工时类型
            <select id="category">
              <option value="服务台/监控">服务台/监控</option>
              <option value="投诉/问题排查&处理">投诉/问题排查&处理</option>
              <option value="升级/测试/业务操作" selected>升级/测试/业务操作</option>
              <option value="培训">培训</option>
              <option value="部署/配置">部署/配置</option>
              <option value="日常维护/数据治理">日常维护/数据治理</option>
              <option value="故障/软硬件BUG处理">故障/软硬件BUG处理</option>
              <option value="需求调研">需求调研</option>
              <option value="管理和沟通">管理和沟通</option>
              <option value="割接对账">割接对账</option>
            </select>
          </label>

          <label>
            工作说明
            <textarea id="workDescription" rows="4">大版本回归 + 维护支持</textarea>
          </label>

          <label class="checkbox">
            <input id="isTravel" type="checkbox">
            是否出差
          </label>

          <label>
            飞连登录等待（秒）
            <input id="loginWaitSeconds" type="number" min="3" max="120" step="1" value="12">
          </label>

          <label>
            步骤间隔（秒）
            <input id="stepWaitSeconds" type="number" min="0.5" max="10" step="0.5" value="1.2">
          </label>

          <button id="preview" type="button" class="secondary">生成计划</button>
          <button id="start" type="button" class="primary">开始填报</button>
        </aside>
      </section>

      <section class="result-panel">
        <div class="result-header">
          <h2>执行结果</h2>
          <span id="status">未启动</span>
        </div>
        <pre id="output">选择日期后先生成计划，确认无误后开始填报。</pre>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
